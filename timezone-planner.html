<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Zone Overlap Planner | Signal Studio</title>
  <meta
    name="description"
    content="複数地域の就業時間帯から、重なりやすいミーティング候補を探せる静的タイムゾーン調整ツールです。"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./assets/site.css" />
  <script src="./assets/analytics.js"></script>
</head>
<body>
  <main>
    <header class="topbar">
      <a class="brand" href="./index.html">Signal Studio</a>
      <nav class="topbar-nav">
        <a class="nav-link" href="./meeting-cost.html">Meeting Cost</a>
        <a class="nav-link" href="./launch-planner.html">Launch Checklist</a>
        <a class="nav-link" href="./utm-builder.html">UTM Builder</a>
      </nav>
    </header>

    <section class="hero">
      <p class="eyebrow">Remote Ops</p>
      <h1>Time Zone Overlap Planner</h1>
      <p class="lead">
        参加地域と就業時間帯から、重なりやすい時間帯を出します。
        比較行動が自然に発生しやすく、GA4でも地域組み合わせの分析題材になります。
      </p>
    </section>

    <section class="tool-layout">
      <aside class="panel">
        <div class="section-heading">
          <h2>Inputs</h2>
        </div>
        <div class="input-grid">
          <label class="input-stack">
            <span>日付</span>
            <input id="meeting-date" type="date" />
          </label>
          <label class="input-stack">
            <span>会議時間</span>
            <select id="duration">
              <option value="30">30 min</option>
              <option value="45">45 min</option>
              <option value="60" selected>60 min</option>
              <option value="90">90 min</option>
            </select>
          </label>
          <label class="input-stack">
            <span>就業開始</span>
            <input id="work-start" type="time" value="09:00" />
          </label>
          <label class="input-stack">
            <span>就業終了</span>
            <input id="work-end" type="time" value="18:00" />
          </label>
        </div>
        <div class="label-stack">
          <span>参加地域</span>
          <div class="chip-row" id="city-chips">
            <button class="chip is-active" type="button" data-city="San Francisco" data-zone="America/Los_Angeles" aria-pressed="true">San Francisco</button>
            <button class="chip is-active" type="button" data-city="New York" data-zone="America/New_York" aria-pressed="true">New York</button>
            <button class="chip" type="button" data-city="London" data-zone="Europe/London" aria-pressed="false">London</button>
            <button class="chip is-active" type="button" data-city="Tokyo" data-zone="Asia/Tokyo" aria-pressed="true">Tokyo</button>
            <button class="chip" type="button" data-city="Singapore" data-zone="Asia/Singapore" aria-pressed="false">Singapore</button>
            <button class="chip" type="button" data-city="Sydney" data-zone="Australia/Sydney" aria-pressed="false">Sydney</button>
          </div>
        </div>
        <div class="button-row">
          <button class="pill-button" id="generate-button" type="button">候補を出す</button>
          <button class="secondary-button" id="copy-button" type="button">候補をコピー</button>
        </div>
      </aside>

      <section class="section-stack">
        <article class="result-card">
          <div class="section-heading">
            <h2>Best Overlap Windows</h2>
            <p class="muted" id="planner-summary">参加地域の重なりを上から表示します。</p>
          </div>
          <div class="section-stack" id="overlap-results"></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    SiteAnalytics.initPage({
      pageType: "tool",
      contentGroup: "remote_ops",
      toolName: "timezone_planner"
    });

    const dateEl = document.getElementById("meeting-date");
    const durationEl = document.getElementById("duration");
    const workStartEl = document.getElementById("work-start");
    const workEndEl = document.getElementById("work-end");
    const chips = Array.from(document.querySelectorAll("#city-chips .chip"));
    const resultsEl = document.getElementById("overlap-results");
    const summaryEl = document.getElementById("planner-summary");

    const today = new Date();
    dateEl.value = new Date(today.getTime() + 86400000).toISOString().slice(0, 10);

    function selectedCities() {
      return chips
        .filter((chip) => chip.classList.contains("is-active"))
        .map((chip) => ({ city: chip.dataset.city, zone: chip.dataset.zone }));
    }

    function minutesFromTime(value) {
      const [hour, minute] = value.split(":").map(Number);
      return hour * 60 + minute;
    }

    function formatLocal(date, zone) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function localMinutes(date, zone) {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date);
      const hour = Number(parts.find((part) => part.type === "hour").value);
      const minute = Number(parts.find((part) => part.type === "minute").value);
      return (hour * 60) + minute;
    }

    function buildCandidates() {
      const cities = selectedCities();
      const workStart = minutesFromTime(workStartEl.value);
      const workEnd = minutesFromTime(workEndEl.value);
      const duration = Number(durationEl.value);
      const baseDate = new Date(dateEl.value + "T00:00:00Z");
      const candidates = [];

      for (let minute = 0; minute < 24 * 60; minute += 30) {
        const startDate = new Date(baseDate.getTime() + (minute * 60000));
        const endDate = new Date(startDate.getTime() + (duration * 60000));
        let score = 0;
        const lines = [];

        cities.forEach((city) => {
          const startMinute = localMinutes(startDate, city.zone);
          const endMinute = localMinutes(endDate, city.zone);
          const withinWindow = startMinute >= workStart && endMinute <= workEnd;
          if (withinWindow) score += 1;
          lines.push(city.city + ": " + formatLocal(startDate, city.zone) + " - " + formatLocal(endDate, city.zone) + (withinWindow ? " good" : " outside"));
        });

        if (score > 0) {
          candidates.push({ startDate, score, lines });
        }
      }

      return candidates
        .sort((a, b) => b.score - a.score || a.startDate - b.startDate)
        .slice(0, 5);
    }

    function renderCandidates() {
      const cities = selectedCities();
      const candidates = buildCandidates();
      summaryEl.textContent = cities.length + "地域を対象に、重なりスコアの高い候補を表示しています。";

      if (!candidates.length) {
        resultsEl.innerHTML = '<article class="checklist-card"><h3>候補なし</h3><p class="summary-text">就業時間帯を少し広げるか、参加地域を減らしてください。</p></article>';
        return candidates;
      }

      resultsEl.innerHTML = candidates.map((candidate, index) => {
        const title = "Candidate " + (index + 1) + " / score " + candidate.score + " of " + cities.length;
        const lines = candidate.lines.map((line) => "<li>" + line + "</li>").join("");
        return '<article class="checklist-card"><h3>' + title + '</h3><ul>' + lines + "</ul></article>";
      }).join("");

      return candidates;
    }

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        chip.classList.toggle("is-active");
        chip.setAttribute("aria-pressed", String(chip.classList.contains("is-active")));
        SiteAnalytics.trackOnce("timezone_started", "tool_interaction_started", {
          tool_stage: "input_started"
        });
      });
    });

    [dateEl, durationEl, workStartEl, workEndEl].forEach((element) => {
      element.addEventListener("change", () => {
        SiteAnalytics.trackOnce("timezone_started", "tool_interaction_started", {
          tool_stage: "input_started"
        });
      });
    });

    document.getElementById("generate-button").addEventListener("click", () => {
      const cities = selectedCities();
      const candidates = renderCandidates();
      SiteAnalytics.track("timezone_plan_created", {
        city_count: cities.length,
        duration_min: Number(durationEl.value),
        best_score: candidates[0] ? candidates[0].score : 0
      });
    });

    document.getElementById("copy-button").addEventListener("click", async () => {
      const cities = selectedCities();
      const candidates = renderCandidates();
      const text = candidates.map((candidate, index) => {
        return [
          "Candidate " + (index + 1),
          ...candidate.lines
        ].join("\n");
      }).join("\n\n");

      await SiteAnalytics.copyText(text || "No candidates", {
        copied_asset: "timezone_candidates",
        city_count: cities.length
      });
    });

    renderCandidates();
  </script>
</body>
</html>
