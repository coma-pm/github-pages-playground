<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Distance</title>

  <script src="../assets/js/google-tag.js"></script>
</head>
<body>
  <p><a href="../index.html">index</a></p>
  <p>Calculate the number of days between a start date and an end date, inclusive of both dates.</p>

  <p>
    <label for="start-date">Start date</label>
    <input id="start-date" type="date">
  </p>

  <p>
    <label for="end-date">End date</label>
    <input id="end-date" type="date">
  </p>

  <p>
    <label for="day-count">Days</label>
    <input id="day-count" type="number" inputmode="numeric" step="1">
  </p>

  <p id="summary"></p>

  <script type="module" src="../assets/js/date-distance.js"></script>
</body>
</html>
