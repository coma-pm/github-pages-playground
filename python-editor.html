<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Editor | GitHub Pages Playground</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6HSYY8Z3X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-P6HSYY8Z3X");
  </script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #08111c;
      --panel: rgba(9, 22, 34, 0.78);
      --panel-strong: rgba(12, 28, 42, 0.9);
      --line: rgba(146, 199, 227, 0.16);
      --text: #eef5ff;
      --muted: #91a8bc;
      --accent: #58d3b3;
      --accent-strong: #77b8ff;
      --output: rgba(5, 11, 18, 0.82);
      --shadow: 0 32px 90px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Avenir Next", "Hiragino Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 16%, rgba(83, 153, 255, 0.18), transparent 28%),
        radial-gradient(circle at 82% 10%, rgba(88, 211, 179, 0.14), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 208, 111, 0.08), transparent 22%),
        linear-gradient(180deg, #08111c 0%, #091420 36%, #050b12 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(140, 193, 221, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140, 193, 221, 0.045) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      opacity: 0.55;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 72px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .brand-pill,
    .nav-link,
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease;
    }

    .brand-pill,
    .nav-link {
      border: 1px solid var(--line);
      background: rgba(8, 18, 28, 0.55);
      color: var(--text);
      backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 26px;
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(10, 23, 35, 0.82), rgba(7, 16, 24, 0.84));
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.84rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      line-height: 0.92;
      letter-spacing: -0.06em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      max-width: 60ch;
    }

    .workspace {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    textarea {
      width: 100%;
      min-height: 320px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(5, 11, 18, 0.78);
      color: var(--text);
      font-family: "IBM Plex Mono", "SFMono-Regular", "Menlo", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    label {
      font-size: 0.95rem;
      color: var(--muted);
    }

    select {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(5, 11, 18, 0.78);
      color: var(--text);
      font: inherit;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(88, 211, 179, 0.95), rgba(119, 184, 255, 0.92));
      color: #041018;
      cursor: pointer;
      box-shadow: 0 14px 40px rgba(88, 211, 179, 0.2);
    }

    .brand-pill:hover,
    .brand-pill:focus-visible,
    .nav-link:hover,
    .nav-link:focus-visible,
    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
    }

    button.secondary {
      background: rgba(11, 25, 38, 0.68);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.secondary:hover,
    button.secondary:focus-visible {
      background: rgba(88, 211, 179, 0.12);
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status[data-state="error"] {
      color: #ff8a80;
    }

    .status[data-state="success"] {
      color: var(--accent);
    }

    pre {
      margin: 20px 0 0;
      min-height: 140px;
      padding: 16px;
      border-radius: 16px;
      background: var(--output);
      border: 1px solid rgba(146, 199, 227, 0.12);
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.6;
      color: var(--text);
      font-family: "IBM Plex Mono", "SFMono-Regular", "Menlo", "Consolas", monospace;
    }

    @media (max-width: 640px) {
      main {
        padding-top: 24px;
      }

      .hero {
        padding: 24px;
      }

      .workspace {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="brand-pill" href="./index.html">GitHub Pages Playground</a>
      <div class="topbar-nav">
        <a class="nav-link" href="./index.html">Index</a>
        <a class="nav-link" href="./static-showcase.html">Global Launch Console</a>
      </div>
    </div>

    <section class="hero">
      <p class="eyebrow">Interactive Tool</p>
      <h1>Python Editor</h1>
      <p class="lead">
        Run Python code directly in the browser while keeping the same visual language as the rest of the playground.
      </p>
    </section>

    <section class="workspace">
      <div class="toolbar">
        <div class="toolbar-group">
          <label for="sample-select">Sample</label>
          <select id="sample-select">
            <option value="hello">Hello Pyodide</option>
            <option value="math">Math and Loop</option>
            <option value="text">Text Processing</option>
          </select>
        </div>
        <div class="toolbar-group">
          <button class="secondary" type="button" id="reset-button">Load Sample</button>
          <button class="secondary" type="button" id="clear-button">Clear Output</button>
          <button class="secondary" type="button" id="share-button">Copy Share Link</button>
        </div>
      </div>

      <textarea id="code">print("Hello Pyodide")

numbers = [1, 2, 3, 4, 5]

print("sum =", sum(numbers))

for i in range(3):
    print("i =", i)</textarea>

      <div class="actions">
        <button type="button" id="run-button" disabled>Run Python</button>
        <div class="status" id="status">Loading Pyodide...</div>
      </div>

      <pre id="output"></pre>
    </section>
  </main>

  <script type="module">
    import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.mjs";

    const STORAGE_KEY = "github-pages-playground.python-editor.code";
    const DEFAULT_SAMPLE = "hello";
    const samples = {
      hello: `print("Hello Pyodide")

numbers = [1, 2, 3, 4, 5]

print("sum =", sum(numbers))

for i in range(3):
    print("i =", i)`,
      math: `from math import sqrt

values = [4, 9, 16, 25]

for value in values:
    print(f"sqrt({value}) =", sqrt(value))

print("done")`,
      text: `text = "GitHub Pages Playground"

print(text.upper())
print(text.replace(" ", "-").lower())
print("words =", len(text.split()))`
    };

    const outputEl = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const codeEl = document.getElementById("code");
    const sampleSelectEl = document.getElementById("sample-select");
    const runButtonEl = document.getElementById("run-button");
    const resetButtonEl = document.getElementById("reset-button");
    const clearButtonEl = document.getElementById("clear-button");
    const shareButtonEl = document.getElementById("share-button");

    let pyodide = null;

    function setStatus(message, state = "idle") {
      statusEl.textContent = message;
      statusEl.dataset.state = state;
    }

    function appendOutput(text) {
      outputEl.textContent += text + "\n";
    }

    function setEditorCode(code) {
      codeEl.value = code;
      localStorage.setItem(STORAGE_KEY, code);
    }

    function getSharedUrl(code) {
      const url = new URL(window.location.href);
      url.searchParams.set("code", code);
      return url.toString();
    }

    function loadStoredCode() {
      const params = new URLSearchParams(window.location.search);
      const sharedCode = params.get("code");

      if (sharedCode) {
        codeEl.value = sharedCode;
        localStorage.setItem(STORAGE_KEY, sharedCode);
        setStatus("Loaded shared code from URL", "success");
        return;
      }

      const storedCode = localStorage.getItem(STORAGE_KEY);

      if (storedCode) {
        codeEl.value = storedCode;
        setStatus("Restored saved draft", "success");
        return;
      }

      setEditorCode(samples[DEFAULT_SAMPLE]);
    }

    async function initializePyodide() {
      try {
        pyodide = await loadPyodide();
        pyodide.setStdout({
          batched: (text) => {
            appendOutput(text);
          }
        });

        pyodide.setStderr({
          batched: (text) => {
            appendOutput(text);
          }
        });

        runButtonEl.disabled = false;
        setStatus("Pyodide loaded", "success");
      } catch (error) {
        setStatus("Failed to load Pyodide. Reload the page and try again.", "error");
        appendOutput(`Load error: ${error.message}`);
      }
    }

    async function runPython() {
      if (!pyodide) {
        setStatus("Pyodide is not ready yet", "error");
        return;
      }

      outputEl.textContent = "";
      const code = codeEl.value;
      runButtonEl.disabled = true;
      setStatus("Running Python...", "success");

      try {
        const result = await pyodide.runPythonAsync(code);

        if (result !== undefined) {
          appendOutput(String(result));
        }

        setStatus("Run completed", "success");
      } catch (error) {
        appendOutput(String(error));
        setStatus("Run failed", "error");
      } finally {
        runButtonEl.disabled = false;
      }
    }

    codeEl.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, codeEl.value);
      setStatus("Draft saved locally");
    });

    sampleSelectEl.addEventListener("change", () => {
      const selectedSample = samples[sampleSelectEl.value];
      setEditorCode(selectedSample);
      outputEl.textContent = "";
      setStatus("Sample loaded", "success");
    });

    resetButtonEl.addEventListener("click", () => {
      const selectedSample = samples[sampleSelectEl.value];
      setEditorCode(selectedSample);
      outputEl.textContent = "";
      setStatus("Sample reloaded", "success");
    });

    clearButtonEl.addEventListener("click", () => {
      outputEl.textContent = "";
      setStatus("Output cleared");
    });

    shareButtonEl.addEventListener("click", async () => {
      const shareUrl = getSharedUrl(codeEl.value);

      try {
        await navigator.clipboard.writeText(shareUrl);
        setStatus("Share link copied", "success");
      } catch (error) {
        outputEl.textContent = shareUrl;
        appendOutput("");
        appendOutput(`Clipboard error: ${error.message}`);
        setStatus("Share link shown in output", "error");
      }
    });

    runButtonEl.addEventListener("click", runPython);

    loadStoredCode();
    initializePyodide();
  </script>
</body>
</html>
