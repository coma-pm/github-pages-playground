<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTM Builder | Signal Studio</title>
  <meta
    name="description"
    content="source / medium / campaignを整えたURLをすばやく生成できる、GitHub Pages向けの静的UTM builderです。"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./assets/site.css" />
  <script src="./assets/analytics.js"></script>
</head>
<body>
  <main>
    <header class="topbar">
      <a class="brand" href="./index.html">Signal Studio</a>
      <nav class="topbar-nav">
        <a class="nav-link" href="./meeting-cost.html">Meeting Cost</a>
        <a class="nav-link" href="./timezone-planner.html">Time Zone</a>
        <a class="nav-link" href="./launch-planner.html">Launch Checklist</a>
      </nav>
    </header>

    <section class="hero">
      <p class="eyebrow">Measurement Setup</p>
      <h1>UTM Builder</h1>
      <p class="lead">
        命名ルールを崩さずにUTM付きURLを作るためのシンプルなツールです。
        実務で使いやすく、GA4ではsource / medium / campaignの生成傾向も集められます。
      </p>
    </section>

    <section class="tool-layout">
      <aside class="panel">
        <div class="section-heading">
          <h2>Inputs</h2>
        </div>
        <div class="input-grid">
          <label class="input-stack">
            <span>Base URL</span>
            <input id="base-url" type="url" value="https://example.com/pricing" />
          </label>
          <label class="input-stack">
            <span>utm_source</span>
            <input id="utm-source" type="text" value="newsletter" />
          </label>
          <label class="input-stack">
            <span>utm_medium</span>
            <input id="utm-medium" type="text" value="email" />
          </label>
          <label class="input-stack">
            <span>utm_campaign</span>
            <input id="utm-campaign" type="text" value="q3_launch" />
          </label>
          <label class="input-stack">
            <span>utm_content</span>
            <input id="utm-content" type="text" value="hero_cta" />
          </label>
          <label class="input-stack">
            <span>utm_term</span>
            <input id="utm-term" type="text" placeholder="optional" />
          </label>
        </div>
        <div class="button-row">
          <button class="pill-button" id="build-button" type="button">URLを生成</button>
          <button class="secondary-button" id="copy-button" type="button">コピー</button>
        </div>
      </aside>

      <section class="section-stack">
        <article class="result-card">
          <div class="section-heading">
            <h2>Generated URL</h2>
            <p class="muted" id="validation-note">英数字とアンダースコア中心の命名にそろえると比較しやすくなります。</p>
          </div>
          <pre id="utm-output"></pre>
        </article>

        <article class="section-card">
          <div class="section-heading">
            <h2>Quick checks</h2>
          </div>
          <div class="checklist-grid" id="check-grid"></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    SiteAnalytics.initPage({
      pageType: "tool",
      contentGroup: "measurement",
      toolName: "utm_builder"
    });

    const fieldIds = ["base-url", "utm-source", "utm-medium", "utm-campaign", "utm-content", "utm-term"];
    const fields = Object.fromEntries(fieldIds.map((id) => [id, document.getElementById(id)]));
    const outputEl = document.getElementById("utm-output");
    const checkGridEl = document.getElementById("check-grid");
    const validationNoteEl = document.getElementById("validation-note");

    function normalizeValue(value) {
      return value.trim().toLowerCase().replace(/\s+/g, "_");
    }

    function safeLengthBucket(value) {
      if (value.length <= 8) return "short";
      if (value.length <= 16) return "medium";
      return "long";
    }

    function buildUrl() {
      let url;
      try {
        url = new URL(fields["base-url"].value);
      } catch (error) {
        outputEl.textContent = "Base URLが不正です";
        checkGridEl.innerHTML = "";
        validationNoteEl.textContent = "https:// から始まるURLを入れてください。";
        return null;
      }

      const params = {
        utm_source: normalizeValue(fields["utm-source"].value),
        utm_medium: normalizeValue(fields["utm-medium"].value),
        utm_campaign: normalizeValue(fields["utm-campaign"].value),
        utm_content: normalizeValue(fields["utm-content"].value),
        utm_term: normalizeValue(fields["utm-term"].value)
      };

      Object.entries(params).forEach(([key, value]) => {
        if (value) url.searchParams.set(key, value);
      });

      const checks = [
        { title: "source / mediumの重複防止", pass: params.utm_source !== params.utm_medium },
        { title: "campaign命名は16文字以内推奨", pass: params.utm_campaign.length <= 16 },
        { title: "contentが空ではない", pass: Boolean(params.utm_content) }
      ];

      outputEl.textContent = url.toString();
      validationNoteEl.textContent = "命名ルールは小文字 + アンダースコアで正規化しています。";
      checkGridEl.innerHTML = checks.map((check) => {
        return '<article class="checklist-card"><span class="kicker">' + (check.pass ? "OK" : "Review") + "</span><p>" + check.title + "</p></article>";
      }).join("");

      return { url: url.toString(), params };
    }

    fieldIds.forEach((id) => {
      fields[id].addEventListener("change", () => {
        SiteAnalytics.trackOnce("utm_started", "tool_interaction_started", {
          tool_stage: "input_started"
        });
      });
    });

    document.getElementById("build-button").addEventListener("click", () => {
      const result = buildUrl();
      if (!result) return;
      SiteAnalytics.track("utm_built", {
        source: result.params.utm_source,
        medium: result.params.utm_medium,
        campaign_length_bucket: safeLengthBucket(result.params.utm_campaign),
        has_term: Boolean(result.params.utm_term)
      });
    });

    document.getElementById("copy-button").addEventListener("click", async () => {
      const result = buildUrl();
      if (!result) return;
      await SiteAnalytics.copyText(result.url, {
        copied_asset: "utm_url",
        medium: result.params.utm_medium
      });
    });

    buildUrl();
  </script>
</body>
</html>
