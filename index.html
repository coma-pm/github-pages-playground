<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>GitHub Pages Playground</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6HSYY8Z3X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-P6HSYY8Z3X');
  </script>
</head>

<body>

  <h1>GitHub Pages Playground</h1>

  <button onclick="runPython()">
    Run Python
  </button>

  <pre id="output"></pre>

  <script type="module">

    import { loadPyodide }
      from "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.mjs";

    const pyodide = await loadPyodide();

    window.runPython = async function () {

      const result =
        await pyodide.runPythonAsync(`
sum([1, 2, 3, 4, 5])
        `);

      document.getElementById("output")
        .textContent = "Result: " + result;
    };

  </script>

</body>
</html>
