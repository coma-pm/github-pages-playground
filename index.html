<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>GitHub Pages Playground</title>

  <!-- Google tag (gtag.js) -->
  <script async
    src="https://www.googletagmanager.com/gtag/js?id=G-P6HSYY8Z3X">
  </script>

  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag(){
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-P6HSYY8Z3X');
  </script>

  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
    }

    textarea {
      width: 100%;
      height: 320px;
      font-family: monospace;
      font-size: 14px;
      padding: 12px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      padding: 16px;
      overflow-x: auto;
      white-space: pre-wrap;
      margin-top: 20px;
      min-height: 120px;
    }

    .status {
      margin-top: 12px;
      color: #666;
    }
  </style>
</head>

<body>

  <h1>GitHub Pages Playground</h1>

  <p>
    Pythonコードをブラウザ上で実行できます。
  </p>

  <textarea id="code">
print("Hello Pyodide")

numbers = [1, 2, 3, 4, 5]

print("sum =", sum(numbers))

for i in range(3):
    print("i =", i)
  </textarea>

  <br />

  <button onclick="runPython()">
    Run Python
  </button>

  <div class="status" id="status">
    Loading Pyodide...
  </div>

  <pre id="output"></pre>

  <script type="module">

    import { loadPyodide }
      from "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.mjs";

    const outputEl = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const codeEl = document.getElementById("code");

    function appendOutput(text) {
      outputEl.textContent += text + "\n";
    }

    const pyodide = await loadPyodide();

    statusEl.textContent = "Pyodide loaded";

    pyodide.setStdout({
      batched: (text) => {
        appendOutput(text);
      }
    });

    pyodide.setStderr({
      batched: (text) => {
        appendOutput(text);
      }
    });

    window.runPython = async function () {

      outputEl.textContent = "";

      const code = codeEl.value;

      try {

        const result =
          await pyodide.runPythonAsync(code);

        if (result !== undefined) {
          appendOutput(String(result));
        }

      } catch (error) {

        appendOutput(error);

      }
    };

  </script>

</body>
</html>
