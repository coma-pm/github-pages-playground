<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages Playground</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6HSYY8Z3X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());
    gtag("config", "G-P6HSYY8Z3X");
  </script>

  <style>
    :root {
      color-scheme: light;
      --bg: #f6efe5;
      --panel: rgba(255, 252, 247, 0.82);
      --line: rgba(91, 62, 43, 0.16);
      --text: #2f241d;
      --muted: #715f54;
      --accent: #c55c32;
      --accent-strong: #9f3c1b;
      --shadow: 0 20px 60px rgba(95, 63, 46, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 38%),
        linear-gradient(135deg, #f8f2ea 0%, #efe2d1 52%, #e8d5c1 100%);
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0 88px;
    }

    .hero {
      display: grid;
      gap: 20px;
      margin-bottom: 36px;
    }

    .eyebrow {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      max-width: 640px;
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      display: grid;
      gap: 14px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0;
      font-size: 1.3rem;
    }

    .card p {
      margin: 0;
      line-height: 1.7;
      color: var(--muted);
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fffaf6;
      text-decoration: none;
      font-weight: 700;
      transition: transform 140ms ease, background-color 140ms ease;
    }

    .link-button:hover,
    .link-button:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .note {
      margin-top: 28px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      main {
        padding-top: 56px;
      }

      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">GitHub Pages Playground</p>
      <h1>Playground Entrance</h1>
      <p class="lead">
        このトップページは各コンテンツへの入口です。実験ページやツールは個別ページへ分離し、ここから移動できるようにしています。
      </p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Python Editor</h2>
        <p>
          Pyodide を使って、ブラウザ上で Python コードを実行するページです。
        </p>
        <a class="link-button" href="./python-editor.html">Open Editor</a>
      </article>
    </section>

    <p class="note">
      今後ページを増やす場合も、この `index.html` から一覧できる構成にできます。
    </p>
  </main>
</body>
</html>
